<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="trophyGold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FFC700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#DAA520;stop-opacity:1" />
    </linearGradient>
    <filter id="trophyGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Trophy base -->
  <rect x="35" y="80" width="30" height="8" rx="2" fill="#8B4513"/>
  <rect x="30" y="75" width="40" height="5" fill="url(#trophyGold)" stroke="#B8860B" stroke-width="1"/>
  
  <!-- Trophy stem -->
  <rect x="45" y="60" width="10" height="15" fill="url(#trophyGold)" stroke="#B8860B" stroke-width="1"/>
  
  <!-- Trophy cup -->
  <path d="M 30 60 L 35 30 Q 35 25 40 25 L 60 25 Q 65 25 65 30 L 70 60 Q 70 65 50 65 Q 30 65 30 60 Z" 
        fill="url(#trophyGold)" 
        stroke="#B8860B" 
        stroke-width="2"
        filter="url(#trophyGlow)"/>
  
  <!-- Left handle -->
  <path d="M 30 35 Q 20 35 20 45 Q 20 50 25 50 L 30 48" 
        stroke="url(#trophyGold)" 
        stroke-width="4" 
        fill="none" 
        stroke-linecap="round"/>
  
  <!-- Right handle -->
  <path d="M 70 35 Q 80 35 80 45 Q 80 50 75 50 L 70 48" 
        stroke="url(#trophyGold)" 
        stroke-width="4" 
        fill="none" 
        stroke-linecap="round"/>
  
  <!-- Highlight reflection -->
  <ellipse cx="45" cy="35" rx="8" ry="12" fill="white" opacity="0.3"/>
  
  <!-- Star on trophy -->
  <path d="M 50 40 L 52 46 L 58 46 L 53 50 L 55 56 L 50 52 L 45 56 L 47 50 L 42 46 L 48 46 Z" 
        fill="white" 
        opacity="0.6"/>
  
  <!-- Sparkles -->
  <circle cx="20" cy="20" r="2" fill="#FFD700">
    <animate attributeName="opacity" values="0;1;0" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="80" cy="25" r="2" fill="#FFD700">
    <animate attributeName="opacity" values="0;1;0" dur="1.5s" begin="0.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="75" cy="70" r="1.5" fill="#FFD700">
    <animate attributeName="opacity" values="0;1;0" dur="1.5s" begin="1s" repeatCount="indefinite"/>
  </circle>
</svg>
