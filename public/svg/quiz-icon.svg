<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="quizGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9B59B6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8E44AD;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Clipboard -->
  <rect x="20" y="15" width="60" height="75" rx="5" fill="url(#quizGradient)" stroke="#6C3483" stroke-width="2"/>
  <!-- Clip -->
  <rect x="40" y="10" width="20" height="8" rx="3" fill="#34495E"/>
  <!-- Question marks -->
  <circle cx="35" cy="35" r="3" fill="white"/>
  <rect x="33" y="38" width="4" height="8" fill="white"/>
  <circle cx="50" cy="35" r="3" fill="white"/>
  <rect x="48" y="38" width="4" height="8" fill="white"/>
  <circle cx="65" cy="35" r="3" fill="white"/>
  <rect x="63" y="38" width="4" height="8" fill="white"/>
  <!-- Checkboxes -->
  <rect x="30" y="55" width="10" height="10" rx="2" fill="white" opacity="0.8"/>
  <rect x="30" y="70" width="10" height="10" rx="2" fill="white" opacity="0.8"/>
  <!-- Checkmark -->
  <path d="M 32 60 L 35 63 L 38 57" stroke="#27AE60" stroke-width="2" fill="none" stroke-linecap="round"/>
</svg>
