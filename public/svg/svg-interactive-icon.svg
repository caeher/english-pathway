<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="sceneGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1ABC9C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16A085;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Scene frame -->
  <rect x="10" y="10" width="80" height="80" rx="5" fill="#ECF0F1" stroke="#34495E" stroke-width="2"/>
  
  <!-- Interactive elements with click indicators -->
  <!-- House -->
  <rect x="20" y="50" width="25" height="20" fill="url(#sceneGradient)" stroke="#0E6655" stroke-width="1.5"/>
  <path d="M 17 50 L 32.5 35 L 48 50 Z" fill="#E74C3C" stroke="#C0392B" stroke-width="1.5"/>
  <rect x="28" y="60" width="8" height="10" fill="#8B4513"/>
  <circle cx="24" cy="60" r="1.5" fill="#F39C12"/>
  
  <!-- Tree -->
  <rect x="60" y="60" width="5" height="15" fill="#8B4513"/>
  <circle cx="62.5" cy="57" r="8" fill="#27AE60" stroke="#229954" stroke-width="1.5"/>
  <circle cx="25" cy="78" r="1.5" fill="#3498DB"/>
  
  <!-- Sun -->
  <circle cx="75" cy="25" r="8" fill="#F39C12" stroke="#E67E22" stroke-width="1.5"/>
  <circle cx="75" cy="25" r="1.5" fill="#E74C3C"/>
  
  <!-- Click markers -->
  <circle cx="32.5" cy="55" r="3" fill="none" stroke="#E74C3C" stroke-width="2" opacity="0.7">
    <animate attributeName="r" values="3;5;3" dur="1.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;0.3;0.7" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  
  <circle cx="62.5" cy="60" r="3" fill="none" stroke="#27AE60" stroke-width="2" opacity="0.7">
    <animate attributeName="r" values="3;5;3" dur="1.5s" begin="0.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;0.3;0.7" dur="1.5s" begin="0.5s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Cursor hand -->
  <path d="M 85 75 L 85 85 L 87 83 L 90 88 L 92 87 L 89 82 L 92 82 Z" fill="#34495E" stroke="#2C3E50" stroke-width="1"/>
</svg>
