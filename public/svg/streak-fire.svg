<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <radialGradient id="fireGradient1" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#FFF4E6;stop-opacity:1" />
      <stop offset="40%" style="stop-color:#FFD54F;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#FF9800;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E65100;stop-opacity:0.8" />
    </radialGradient>
    <radialGradient id="fireGradient2" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#FFEB3B;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#FF6F00;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#BF360C;stop-opacity:0.7" />
    </radialGradient>
    <filter id="fireGlow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Outer flame -->
  <path d="M 50 85 Q 35 75 30 60 Q 28 45 35 35 Q 38 28 42 25 Q 40 30 42 35 Q 45 20 50 10 Q 55 20 58 35 Q 60 30 58 25 Q 62 28 65 35 Q 72 45 70 60 Q 65 75 50 85 Z" 
        fill="url(#fireGradient1)" 
        filter="url(#fireGlow)">
    <animate attributeName="d" 
             values="M 50 85 Q 35 75 30 60 Q 28 45 35 35 Q 38 28 42 25 Q 40 30 42 35 Q 45 20 50 10 Q 55 20 58 35 Q 60 30 58 25 Q 62 28 65 35 Q 72 45 70 60 Q 65 75 50 85 Z;
                     M 50 85 Q 33 73 28 58 Q 26 43 33 33 Q 36 26 40 23 Q 38 28 40 33 Q 43 18 50 8 Q 57 18 60 33 Q 62 28 60 23 Q 64 26 67 33 Q 74 43 72 58 Q 67 73 50 85 Z;
                     M 50 85 Q 35 75 30 60 Q 28 45 35 35 Q 38 28 42 25 Q 40 30 42 35 Q 45 20 50 10 Q 55 20 58 35 Q 60 30 58 25 Q 62 28 65 35 Q 72 45 70 60 Q 65 75 50 85 Z" 
             dur="2s" 
             repeatCount="indefinite"/>
  </path>
  
  <!-- Inner flame -->
  <path d="M 50 75 Q 40 68 38 55 Q 37 45 42 38 Q 44 35 46 33 Q 45 36 46 40 Q 48 28 50 20 Q 52 28 54 40 Q 55 36 54 33 Q 56 35 58 38 Q 63 45 62 55 Q 60 68 50 75 Z" 
        fill="url(#fireGradient2)" 
        opacity="0.9">
    <animate attributeName="d" 
             values="M 50 75 Q 40 68 38 55 Q 37 45 42 38 Q 44 35 46 33 Q 45 36 46 40 Q 48 28 50 20 Q 52 28 54 40 Q 55 36 54 33 Q 56 35 58 38 Q 63 45 62 55 Q 60 68 50 75 Z;
                     M 50 75 Q 38 66 36 53 Q 35 43 40 36 Q 42 33 44 31 Q 43 34 44 38 Q 46 26 50 18 Q 54 26 56 38 Q 57 34 56 31 Q 58 33 60 36 Q 65 43 64 53 Q 62 66 50 75 Z;
                     M 50 75 Q 40 68 38 55 Q 37 45 42 38 Q 44 35 46 33 Q 45 36 46 40 Q 48 28 50 20 Q 52 28 54 40 Q 55 36 54 33 Q 56 35 58 38 Q 63 45 62 55 Q 60 68 50 75 Z" 
             dur="1.5s" 
             repeatCount="indefinite"/>
  </path>
  
  <!-- Bright core -->
  <ellipse cx="50" cy="50" rx="6" ry="10" fill="#FFEB3B" opacity="0.8">
    <animate attributeName="ry" values="10;12;10" dur="1s" repeatCount="indefinite"/>
  </ellipse>
  
  <!-- Streak number -->
  <text x="50" y="58" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#BF360C" text-anchor="middle">7</text>
  
  <!-- Sparks -->
  <circle cx="30" cy="40" r="1.5" fill="#FFD54F">
    <animate attributeName="cy" values="40;25;40" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="70" cy="35" r="1.5" fill="#FF9800">
    <animate attributeName="cy" values="35;20;35" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0;1" dur="2.5s" repeatCount="indefinite"/>
  </circle>
</svg>
