<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="beginnerGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#95E1D3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#76D7C4;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.3"/>
    </filter>
  </defs>
  <!-- Badge circle -->
  <circle cx="50" cy="50" r="40" fill="url(#beginnerGradient)" stroke="#48C9B0" stroke-width="3" filter="url(#shadow)"/>
  <circle cx="50" cy="50" r="35" fill="none" stroke="white" stroke-width="2" opacity="0.4"/>
  
  <!-- Ribbon -->
  <path d="M 50 85 L 40 95 L 50 90 L 60 95 Z" fill="#48C9B0" stroke="#3A9E8B" stroke-width="1.5"/>
  
  <!-- Seedling icon -->
  <text x="50" y="62" font-family="Arial, sans-serif" font-size="32" text-anchor="middle">🌱</text>
  
  <!-- Level text -->
  <text x="50" y="30" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white" text-anchor="middle">A1</text>
  <text x="50" y="80" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="white" text-anchor="middle">BEGINNER</text>
</svg>
