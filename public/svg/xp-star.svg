<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="starGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFC107;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF9800;stop-opacity:1" />
    </linearGradient>
    <filter id="starGlow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Star shape -->
  <path d="M 50 10 L 61 40 L 93 40 L 67 58 L 78 88 L 50 70 L 22 88 L 33 58 L 7 40 L 39 40 Z" 
        fill="url(#starGradient)" 
        stroke="#F57C00" 
        stroke-width="2" 
        filter="url(#starGlow)"/>
  
  <!-- Inner star highlight -->
  <path d="M 50 20 L 57 38 L 76 38 L 61 48 L 68 66 L 50 56 L 32 66 L 39 48 L 24 38 L 43 38 Z" 
        fill="white" 
        opacity="0.3"/>
  
  <!-- XP text -->
  <text x="50" y="58" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="white" text-anchor="middle">XP</text>
  
  <!-- Sparkle effects -->
  <circle cx="15" cy="15" r="2" fill="white">
    <animate attributeName="opacity" values="0;1;0" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="85" cy="20" r="1.5" fill="white">
    <animate attributeName="opacity" values="0;1;0" dur="2s" begin="0.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="90" cy="70" r="2" fill="white">
    <animate attributeName="opacity" values="0;1;0" dur="2s" begin="1s" repeatCount="indefinite"/>
  </circle>
</svg>
