<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="moduleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667EEA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764BA2;stop-opacity:1" />
    </linearGradient>
    <filter id="moduleShadow">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Folder back -->
  <path d="M 15 35 L 15 80 Q 15 85 20 85 L 80 85 Q 85 85 85 80 L 85 35 Z" 
        fill="url(#moduleGradient)" 
        stroke="#5A4B8C" 
        stroke-width="2"
        filter="url(#moduleShadow)"/>
  
  <!-- Folder tab -->
  <path d="M 15 35 L 15 25 Q 15 20 20 20 L 40 20 L 45 27 L 85 27 L 85 35 Z" 
        fill="url(#moduleGradient)" 
        stroke="#5A4B8C" 
        stroke-width="2"/>
  
  <!-- Content lines -->
  <line x1="25" y1="50" x2="75" y2="50" stroke="white" stroke-width="2" opacity="0.6"/>
  <line x1="25" y1="60" x2="70" y2="60" stroke="white" stroke-width="2" opacity="0.6"/>
  <line x1="25" y1="70" x2="75" y2="70" stroke="white" stroke-width="2" opacity="0.6"/>
  
  <!-- Module number badge -->
  <circle cx="75" cy="45" r="10" fill="#F39C12" stroke="#E67E22" stroke-width="2"/>
  <text x="75" y="49" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white" text-anchor="middle">M</text>
  
  <!-- Small icons indicating content types -->
  <circle cx="30" cy="50" r="2" fill="#3498DB"/>
  <circle cx="30" cy="60" r="2" fill="#27AE60"/>
  <circle cx="30" cy="70" r="2" fill="#E74C3C"/>
</svg>
