<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="speakingGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E74C3C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C0392B;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Microphone body -->
  <rect x="40" y="25" width="20" height="35" rx="10" fill="url(#speakingGradient)" stroke="#A93226" stroke-width="2"/>
  
  <!-- Microphone grid -->
  <line x1="43" y1="30" x2="43" y2="55" stroke="white" stroke-width="1" opacity="0.3"/>
  <line x1="47" y1="30" x2="47" y2="55" stroke="white" stroke-width="1" opacity="0.3"/>
  <line x1="53" y1="30" x2="53" y2="55" stroke="white" stroke-width="1" opacity="0.3"/>
  <line x1="57" y1="30" x2="57" y2="55" stroke="white" stroke-width="1" opacity="0.3"/>
  
  <!-- Stand -->
  <path d="M 50 60 Q 35 65 35 75 L 50 75" stroke="#34495E" stroke-width="3" fill="none"/>
  <path d="M 50 60 Q 65 65 65 75 L 50 75" stroke="#34495E" stroke-width="3" fill="none"/>
  <line x1="50" y1="60" x2="50" y2="75" stroke="#34495E" stroke-width="3"/>
  
  <!-- Base -->
  <ellipse cx="50" cy="75" rx="20" ry="4" fill="#2C3E50"/>
  
  <!-- Sound waves -->
  <path d="M 70 35 Q 75 35 77 40 Q 75 45 70 45" stroke="#95A5A6" stroke-width="2" fill="none" opacity="0.7">
    <animate attributeName="opacity" values="0.7;0.2;0.7" dur="1.5s" repeatCount="indefinite"/>
  </path>
  <path d="M 75 30 Q 82 30 85 40 Q 82 50 75 50" stroke="#95A5A6" stroke-width="2" fill="none" opacity="0.5">
    <animate attributeName="opacity" values="0.5;0.1;0.5" dur="1.5s" begin="0.3s" repeatCount="indefinite"/>
  </path>
  
  <!-- Speaking icon -->
  <text x="50" y="95" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2C3E50" text-anchor="middle">🗣️</text>
</svg>
