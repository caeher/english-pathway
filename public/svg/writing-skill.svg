<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="writingGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9B59B6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8E44AD;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Paper -->
  <rect x="25" y="15" width="50" height="70" rx="3" fill="white" stroke="#BDC3C7" stroke-width="2"/>
  
  <!-- Lines on paper -->
  <line x1="30" y1="25" x2="70" y2="25" stroke="#ECF0F1" stroke-width="1.5"/>
  <line x1="30" y1="35" x2="70" y2="35" stroke="#ECF0F1" stroke-width="1.5"/>
  <line x1="30" y1="45" x2="70" y2="45" stroke="#ECF0F1" stroke-width="1.5"/>
  <line x1="30" y1="55" x2="70" y2="55" stroke="#ECF0F1" stroke-width="1.5"/>
  <line x1="30" y1="65" x2="70" y2="65" stroke="#ECF0F1" stroke-width="1.5"/>
  <line x1="30" y1="75" x2="70" y2="75" stroke="#ECF0F1" stroke-width="1.5"/>
  
  <!-- Written text -->
  <line x1="32" y1="25" x2="55" y2="25" stroke="url(#writingGradient)" stroke-width="2"/>
  <line x1="32" y1="35" x2="68" y2="35" stroke="url(#writingGradient)" stroke-width="2"/>
  <line x1="32" y1="45" x2="50" y2="45" stroke="url(#writingGradient)" stroke-width="2"/>
  
  <!-- Pen -->
  <rect x="60" y="50" width="8" height="35" rx="1" fill="#34495E" transform="rotate(-30 64 67.5)"/>
  <path d="M 58 48 L 64 43 L 70 49 Z" fill="#F39C12" transform="rotate(-30 64 46)"/>
  <ellipse cx="64" cy="85" rx="3" ry="2" fill="#95A5A6" transform="rotate(-30 64 85)"/>
  
  <!-- Writing icon -->
  <text x="50" y="98" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2C3E50" text-anchor="middle">✍️</text>
</svg>
