<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="barGradient1" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#3498DB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5DADE2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="barGradient2" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#27AE60;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#58D68D;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="barGradient3" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#F39C12;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F8C471;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="barGradient4" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#9B59B6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#BB8FCE;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Chart background -->
  <rect x="10" y="10" width="80" height="70" rx="5" fill="#ECF0F1" stroke="#BDC3C7" stroke-width="1.5"/>
  
  <!-- Grid lines -->
  <line x1="15" y1="30" x2="85" y2="30" stroke="#D5DBDB" stroke-width="1" stroke-dasharray="2,2"/>
  <line x1="15" y1="50" x2="85" y2="50" stroke="#D5DBDB" stroke-width="1" stroke-dasharray="2,2"/>
  <line x1="15" y1="70" x2="85" y2="70" stroke="#D5DBDB" stroke-width="1" stroke-dasharray="2,2"/>
  
  <!-- Bars with animation -->
  <rect x="20" y="45" width="10" height="30" rx="2" fill="url(#barGradient1)" stroke="#2874A6" stroke-width="1">
    <animate attributeName="height" from="0" to="30" dur="1s" fill="freeze"/>
    <animate attributeName="y" from="75" to="45" dur="1s" fill="freeze"/>
  </rect>
  
  <rect x="35" y="35" width="10" height="40" rx="2" fill="url(#barGradient2)" stroke="#1E8449" stroke-width="1">
    <animate attributeName="height" from="0" to="40" dur="1s" begin="0.2s" fill="freeze"/>
    <animate attributeName="y" from="75" to="35" dur="1s" begin="0.2s" fill="freeze"/>
  </rect>
  
  <rect x="50" y="25" width="10" height="50" rx="2" fill="url(#barGradient3)" stroke="#D68910" stroke-width="1">
    <animate attributeName="height" from="0" to="50" dur="1s" begin="0.4s" fill="freeze"/>
    <animate attributeName="y" from="75" to="25" dur="1s" begin="0.4s" fill="freeze"/>
  </rect>
  
  <rect x="65" y="15" width="10" height="60" rx="2" fill="url(#barGradient4)" stroke="#7D3C98" stroke-width="1">
    <animate attributeName="height" from="0" to="60" dur="1s" begin="0.6s" fill="freeze"/>
    <animate attributeName="y" from="75" to="15" dur="1s" begin="0.6s" fill="freeze"/>
  </rect>
  
  <!-- Trend arrow -->
  <path d="M 15 88 L 75 88 L 70 83 M 75 88 L 70 93" stroke="#27AE60" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Labels -->
  <text x="25" y="95" font-family="Arial, sans-serif" font-size="6" fill="#7F8C8D" text-anchor="middle">W1</text>
  <text x="40" y="95" font-family="Arial, sans-serif" font-size="6" fill="#7F8C8D" text-anchor="middle">W2</text>
  <text x="55" y="95" font-family="Arial, sans-serif" font-size="6" fill="#7F8C8D" text-anchor="middle">W3</text>
  <text x="70" y="95" font-family="Arial, sans-serif" font-size="6" fill="#7F8C8D" text-anchor="middle">W4</text>
</svg>
