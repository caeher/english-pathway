<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="readingGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3498DB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2980B9;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Open book -->
  <path d="M 15 30 Q 15 25 20 25 L 45 25 Q 50 25 50 30 L 50 75 Q 50 70 45 70 L 20 70 Q 15 70 15 75 Z" fill="url(#readingGradient)" stroke="#1F618D" stroke-width="2"/>
  <path d="M 85 30 Q 85 25 80 25 L 55 25 Q 50 25 50 30 L 50 75 Q 50 70 55 70 L 80 70 Q 85 70 85 75 Z" fill="url(#readingGradient)" stroke="#1F618D" stroke-width="2"/>
  
  <!-- Text lines on left page -->
  <line x1="20" y1="35" x2="42" y2="35" stroke="white" stroke-width="1.5" opacity="0.8"/>
  <line x1="20" y1="42" x2="42" y2="42" stroke="white" stroke-width="1.5" opacity="0.8"/>
  <line x1="20" y1="49" x2="38" y2="49" stroke="white" stroke-width="1.5" opacity="0.8"/>
  <line x1="20" y1="56" x2="42" y2="56" stroke="white" stroke-width="1.5" opacity="0.8"/>
  
  <!-- Text lines on right page -->
  <line x1="58" y1="35" x2="80" y2="35" stroke="white" stroke-width="1.5" opacity="0.8"/>
  <line x1="58" y1="42" x2="80" y2="42" stroke="white" stroke-width="1.5" opacity="0.8"/>
  <line x1="58" y1="49" x2="77" y2="49" stroke="white" stroke-width="1.5" opacity="0.8"/>
  <line x1="58" y1="56" x2="80" y2="56" stroke="white" stroke-width="1.5" opacity="0.8"/>
  
  <!-- Bookmark -->
  <rect x="46" y="20" width="8" height="30" fill="#E74C3C"/>
  <path d="M 46 50 L 50 45 L 54 50 Z" fill="#E74C3C"/>
  
  <!-- Reading icon -->
  <text x="50" y="95" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2C3E50" text-anchor="middle">📖</text>
</svg>
