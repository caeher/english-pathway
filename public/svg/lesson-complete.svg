<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="checkGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#27AE60;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#229954;stop-opacity:1" />
    </linearGradient>
    <filter id="checkGlow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Circle background -->
  <circle cx="50" cy="50" r="45" fill="url(#checkGradient)" stroke="#1E8449" stroke-width="3" filter="url(#checkGlow)"/>
  <circle cx="50" cy="50" r="40" fill="none" stroke="white" stroke-width="2" opacity="0.3"/>
  
  <!-- Checkmark -->
  <path d="M 30 50 L 42 65 L 70 32" 
        stroke="white" 
        stroke-width="8" 
        fill="none" 
        stroke-linecap="round" 
        stroke-linejoin="round">
    <animate attributeName="stroke-dasharray" from="0 100" to="100 100" dur="0.5s" fill="freeze"/>
    <animate attributeName="stroke-dashoffset" from="100" to="0" dur="0.5s" fill="freeze"/>
  </path>
  
  <!-- Confetti particles -->
  <circle cx="20" cy="20" r="3" fill="#F39C12">
    <animate attributeName="cy" values="50;20" dur="0.8s" fill="freeze"/>
    <animate attributeName="opacity" values="0;1" dur="0.8s" fill="freeze"/>
  </circle>
  <circle cx="80" cy="25" r="2.5" fill="#E74C3C">
    <animate attributeName="cy" values="50;25" dur="0.9s" fill="freeze"/>
    <animate attributeName="opacity" values="0;1" dur="0.9s" fill="freeze"/>
  </circle>
  <circle cx="15" cy="75" r="2" fill="#3498DB">
    <animate attributeName="cy" values="50;75" dur="1s" fill="freeze"/>
    <animate attributeName="opacity" values="0;1" dur="1s" fill="freeze"/>
  </circle>
  <circle cx="85" cy="70" r="3" fill="#9B59B6">
    <animate attributeName="cy" values="50;70" dur="0.85s" fill="freeze"/>
    <animate attributeName="opacity" values="0;1" dur="0.85s" fill="freeze"/ >
  </circle>
  
  <!-- Star burst effect -->
  <path d="M 50 10 L 52 20 L 50 10 L 48 20 Z" fill="white" opacity="0.7">
    <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="2s" repeatCount="indefinite"/>
  </path>
</svg>
