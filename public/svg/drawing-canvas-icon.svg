  <circle cx="30" cy="65" r="5" fill="#9B59B6" opacity="0.7"/>
  <path d="M 50 65 L 55 70 L 60 60" stroke="#27AE60" stroke-width="3" fill="none" stroke-linecap="round"/>
  
  <!-- Brush/pencil -->
