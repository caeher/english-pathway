      <stop offset="0%" style="stop-color:#F39C12;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E67E22;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Canvas frame -->
  <rect x="10" y="15" width="70" height="70" rx="3" fill="white" stroke="#34495E" stroke-width="3"/>
  
