<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#e85d3a">
  <title>Offline — English Pathway</title>
  <style>
    :root { --bg: #faf7f2; --text: #2d2621; --muted: #6e645e; --accent: #e85d3a; --border: #e6dfd5; }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; padding: 1rem; background: var(--bg); color: var(--text); font-family: system-ui, sans-serif; text-align: center; }
    main { max-width: 30rem; padding: 2rem; border: 1px solid var(--border); border-radius: 1.5rem; background: #fff; box-shadow: 0 8px 30px rgb(0 0 0 / 4%); }
    svg { width: 5rem; height: 5rem; margin-bottom: 1rem; fill: none; stroke: var(--accent); stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    h1 { margin: 0 0 .75rem; font-size: 1.75rem; }
    p { margin: 0 0 1.5rem; color: var(--muted); line-height: 1.6; }
    button, a { display: inline-block; padding: .75rem 1.25rem; border: 0; border-radius: .75rem; color: #fff; background: var(--accent); font-weight: 700; text-decoration: none; cursor: pointer; }
    a { margin-left: .5rem; color: var(--accent); background: transparent; }
  </style>
</head>
<body>
  <main>
    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M1 1l22 22M16.72 11.06A10.94 10.94 0 0 1 19 12.5M5 12.5a10.94 10.94 0 0 1 5.83-2.84M8.53 16.03a6.002 6.002 0 0 1 7 0M12 20h.01"/></svg>
    <h1>You are offline</h1>
    <p>We could not load this page because there is no internet connection. Revisit a page you have already opened or try again when you are back online.</p>
    <button onclick="window.location.reload()">Try again</button>
    <a href="/">Go home</a>
  </main>
</body>
</html>
