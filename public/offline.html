<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sin conexión — English Pathway</title>
  <style>
    :root {
      --bg-primary: #faf7f2;
      --text-primary: #2d2621;
      --text-secondary: #6e645e;
      --accent: #e85d3a;
      --accent-hover: #d04b2a;
      --border-primary: #e6dfd5;
      --font-sans: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }

    body {
      background-color: var(--bg-primary);
      color: var(--text-primary);
      font-family: var(--font-sans);
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      box-sizing: border-box;
      text-align: center;
    }

    .container {
      max-width: 480px;
      padding: 2rem;
      border: 1px solid var(--border-primary);
      border-radius: 24px;
      background-color: #ffffff;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.04);
      margin: 1rem;
    }

    .icon-wrapper {
      margin-bottom: 1.5rem;
    }

    .icon {
      width: 80px;
      height: 80px;
      fill: none;
      stroke: var(--accent);
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      margin: 0 auto;
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 800;
      margin: 0 0 0.75rem 0;
      letter-spacing: -0.025em;
    }

    p {
      color: var(--text-secondary);
      line-height: 1.6;
      margin: 0 0 2rem 0;
      font-size: 1rem;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background-color: var(--accent);
      color: #ffffff;
      font-weight: 700;
      padding: 0.75rem 1.5rem;
      border-radius: 12px;
      text-decoration: none;
      transition: background-color 0.2s ease, transform 0.1s ease;
      cursor: pointer;
      border: none;
      font-size: 1rem;
      box-shadow: 0 4px 12px rgba(232, 93, 58, 0.2);
    }

    .btn:hover {
      background-color: var(--accent-hover);
    }

    .btn:active {
      transform: scale(0.98);
    }

    .hint {
      margin-top: 1.5rem;
      font-size: 0.85rem;
      color: var(--text-secondary);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon-wrapper">
      <svg class="icon" viewBox="0 0 24 24">
        <path d="M1 1l22 22M16.72 11.06A10.94 10.94 0 0 1 19 12.5M5 12.5a10.94 10.94 0 0 1 5.83-2.84M8.53 16.03a6.002 6.002 0 0 1 7 0M12 20h.01"/>
      </svg>
    </div>
    <h1>¡Estás sin conexión!</h1>
    <p>No hemos podido cargar esta página porque no estás conectado a Internet. Pero no te preocupes, puedes seguir repasando las lecciones y módulos que hayas visitado anteriormente.</p>
    <button class="btn" onclick="window.location.reload()">Reintentar conexión</button>
    <div class="hint">
      <a href="/" style="color: var(--accent); text-decoration: none; font-weight: 600;">Ir al inicio</a>
    </div>
  </div>
</body>
</html>
