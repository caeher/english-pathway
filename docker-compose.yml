services:
  english-pathway:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        NEXT_PUBLIC_OAUTH_GOOGLE_ENABLED: ${NEXT_PUBLIC_OAUTH_GOOGLE_ENABLED:-false}
        NEXT_PUBLIC_OAUTH_GITHUB_ENABLED: ${NEXT_PUBLIC_OAUTH_GITHUB_ENABLED:-false}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    restart: unless-stopped
